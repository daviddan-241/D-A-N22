version: "3.9"

# =============================================================================
# DAVE DevBox — Docker Compose
# Usage: docker compose up
# =============================================================================

services:
  # ─── Main DevBox ─────────────────────────────────────────────────────────────
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dave-devbox
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
      - "${SSH_PORT:-2222}:22"
    volumes:
      - workspace:/home/dave/workspace
      - ./projects:/dave/projects
      - /var/run/docker.sock:/var/run/docker.sock  # optional: docker-in-docker
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Ollama (Local AI) ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: dave-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ─── Nginx reverse proxy (optional) ──────────────────────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: dave-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - devbox

volumes:
  workspace:
    driver: local
  ollama_models:
    driver: local

networks:
  default:
    name: dave-network
